name: CI/CD — Media Content Management System

# =============================================================================
# Triggers: runs on every push to main/develop, and on Pull Requests to main
# =============================================================================
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: media-content-app
  AZURE_WEBAPP_NAME: your-azure-app-name   # 🔁 Update when you create Azure app

jobs:

  # ── JOB 1: Build & Test ─────────────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restore packages
        run: dotnet restore MediaApp.sln

      - name: 🔨 Build solution
        run: dotnet build MediaApp.sln --no-restore -c Release

      - name: 🧪 Run all tests
        run: |
          dotnet test MediaApp.sln \
            --no-build \
            -c Release \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory ./TestResults

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/*.trx

  # ── JOB 2: Docker Build ──────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Docker image
        run: |
          docker build \
            -t ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            .

      - name: 🔍 Show image size
        run: docker images ${{ env.IMAGE_NAME }}

      # Uncomment when Docker Hub secrets are added:
      # - name: 🔐 Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # - name: 📤 Push to Docker Hub
      #   run: |
      #     docker tag ${{ env.IMAGE_NAME }}:latest \
      #       ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
      #     docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # ── JOB 3: Deploy ────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Publish app
        run: dotnet publish MediaApp/MediaApp.csproj -c Release -o ./publish --no-restore

      # Uncomment when Azure secret is added:
      # - name: 🔐 Login to Azure
      #   uses: azure/login@v1
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: 🚀 Deploy to Azure Web App
      #   uses: azure/webapps-deploy@v3
      #   with:
      #     app-name: ${{ env.AZURE_WEBAPP_NAME }}
      #     package: ./publish

      - name: ✅ Build complete
        run: |
          echo "✅ Media App published successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          ls -lh ./publish